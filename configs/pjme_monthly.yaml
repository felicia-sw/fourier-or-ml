# PJME, 36 monthly origins over the final ~3 years, 3-year rolling training
# window. Core model set (no recursive lgbm_s2 / hybrid_b: run those on the
# full machine — recursion over 720 steps is the slow part).
data:
  source: pjm
  raw_dir: data/raw
  zone: PJME

models: [snaive, harmonic_ols, dhr, lgbm_s1, hybrid_a]

fourier_orders: {24: 8, 168: 4, 8766: 3}

backtest:
  horizons: [1, 24, 168, 720]
  initial_train: 118752   # first origin ~Aug 2015 -> 36 monthly origins to Aug 2018
  step: 720
  train_window: 26280     # 3-year rolling window

output: results
