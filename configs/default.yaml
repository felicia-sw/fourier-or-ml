# Full single-zone backtest (long-running). Repeat per zone / scenario.
data:
  source: pjm
  raw_dir: data/raw
  zone: PJME

models: [snaive, harmonic_ols, dhr, lgbm_s1, lgbm_s2, hybrid_a, hybrid_b]

fourier_orders: {24: 8, 168: 4, 8766: 3}

backtest:
  horizons: [1, 24, 168, 720]
  initial_train: 26280   # 3 years
  step: 720              # retrain monthly

output: results
